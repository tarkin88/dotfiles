[bar/main]
monitor = DisplayPort-1
monitor-fallback = eDP

font-0 = "JetBrainsMono Nerd Font:style=Regular:pixelsize=12;3"
width = 100%
height = 52
line-size = 2
top = true
fixed-center = true
wm-restack = bspwm


override-redirect = false

; scroll-up = next
; scroll-down = prev


background = ${color.bg}
foreground = ${color.fg}
border-size = 0
border-top-size = 2
border-bottom-size = 2
border-left-size = 4
border-right-size = 4
; include-file = $HOME/.config/polybar/fonts.ini

module-margin = 2

modules-left = bspwm
modules-center = date
modules-right = xkeyboard pulseaudio battery

; tray-background = ${colors.bg}
tray-position = right
; tray-maxsize = 16
; tray-detached = true
; tray-offset-x = 1076
tray-detached = false
tray-maxsize = 16
tray-background = ${color.bg}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

cursor-click = pointer
cursor-scroll = ns-resize

[settings]
screenchange-reload = true
enable-ipc = true
compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over


